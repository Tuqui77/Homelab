name: GitOps Validation

on:
  pull_request:
  push:
    branches:
      - Main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # -----------------------------
      # Setup tools
      # -----------------------------
      - name: Setup tools
        run: |
          # kustomize
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

          # kubeconform
          wget https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar xf kubeconform-linux-amd64.tar.gz
          sudo mv kubeconform /usr/local/bin/

          # kubectl
          curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

          # kind
          curl -Lo kind https://kind.sigs.k8s.io/dl/v0.23.0/kind-linux-amd64
          chmod +x kind
          sudo mv kind /usr/local/bin/

          # helm
          curl -fsSL -o get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
          chmod 700 get_helm.sh
          ./get_helm.sh

      # -----------------------------
      # Static validation
      # -----------------------------
      - name: Static validation (kustomize + kubeconform)
        run: |
          set -e

          validate_dir () {
            local base=$1
            find "$base" -type f -name "kustomization.yaml" -exec dirname {} \; | while read dir; do
              echo "--- Static validating: $dir ---"
              kustomize build "$dir" \
                | kubeconform \
                    -strict \
                    -ignore-missing-schemas \
                    -summary \
                    -kubernetes-version 1.29.0
            done
          }

          validate_dir infrastructure
          validate_dir apps

      # -----------------------------
      # Ephemeral cluster
      # -----------------------------
      - name: Create ephemeral Kubernetes (kind)
        run: |
          kind create cluster --wait 60s

      # -----------------------------
      # Server-side validation
      # -----------------------------
      - name: Install prerequisites
        run: |
          echo "--- Installing ArgoCD CRDs ---"
          kubectl apply -k "https://github.com/argoproj/argo-cd/manifests/crds?ref=stable"
          
          echo "--- Installing Cilium ---"
          helm repo add cilium https://helm.cilium.io/
          helm install cilium cilium/cilium --version 1.18.5 --namespace kube-system
          
          echo "--- Installing cert-manager controller ---"
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.14.5/cert-manager.yaml
          
          echo "--- Installing Sealed Secrets controller ---"
          kustomize build infrastructure/sealed-secrets | kubectl apply -f -

      - name: Wait for controllers
        run: |
          echo "--- Waiting for Cilium to be ready ---"
          kubectl wait --for=condition=ready --timeout=300s pod -l k8s-app=cilium -n kube-system --all
          echo "--- Waiting for cert-manager webhook to be ready ---"
          kubectl wait --for=condition=available --timeout=120s deployment/cert-manager-webhook -n cert-manager
          echo "--- Waiting for Sealed Secrets to be ready ---"
          kubectl wait --for=condition=available --timeout=120s deployment/sealed-secrets-controller -n kube-system

      - name: Server-side validation — infrastructure
        run: |
          echo "--- Validating the rest of the infrastructure ---"
          kustomize build infrastructure | kubectl apply -f -
            
      - name: Server-side validation — apps
        run: |
          echo "--- Validating apps ---"
          kustomize build apps | kubectl apply -f -

      # -----------------------------
      # Cleanup
      # -----------------------------
      - name: Delete kind cluster
        if: always()
        run: |
          kind delete cluster
