
name: Validate Kubernetes Manifests

on:
  pull_request:
    branches: [Main]

jobs:
  kubeconform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: yokawasa/action-setup-kube-tools@v0.9.2
        with:
          setup-tools: |
              kubeconform
              kustomize
          kubeconform: 0.5.0
          kustomize: 4.5.7
      - run: |
          kustomize build apps | kubeconform -strict -summary -verbose
          kustomize build infrastructure | kubeconform -strict -summary -verbose


  yaml-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          pip install yaml-lint
          yamllint -d relaxed apps/ infrastructure/

