apiVersion: tailscale.com/v1alpha1
kind: Connector
metadata:
  name: k8s-subnet-router
spec:
  replicas: 1
  hostnamePrefix: k8s-subnet-router
  tags:
    - tag:k8s
  subnetRouter:
    advertiseRoutes:
      - "192.168.100.0/24"
  exitNode: true
  podTemplate:
    securityContext:
      runAsNonRoot: true
      runAsUser: 65538
      runAsGroup: 65538
    containers:
      - name: tailscale
        securityContext:
          capabilities:
            add:
              - NET_ADMIN
              - NET_RAW
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          seccompProfile:
            type: RuntimeDefault
      - name: sysctler
        securityContext:
          capabilities:
            add:
              - SYS_ADMIN
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          seccompProfile:
            type: RuntimeDefault
