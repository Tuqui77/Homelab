ipam:
  mode: kubernetes

kubeProxyReplacement: true

k8sServiceHost: localhost
k8sServicePort: 7445

devices:
  - ens18

l2announcements:
  enabled: true
  leaseDuration: 3s
  leaseRenewDeadline: 1s
  leaseRetryPeriod: 500ms

gatewayAPI:
  enabled: true
  enableAlpn: true
  enableAppProtocol: true

bgpControlPlane:
  enabled: true

externalIPs:
  enabled: true

hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: true

cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

k8sClientRateLimit:
  qps: 32
  burst: 33
