apiVersion: apps/v1
kind: Deployment
metadata:
  name: uptime-kuma
  namespace: monitoring
  labels:
    app: uptime-kuma
spec:
  selector:
    matchLabels:
      app: uptime-kuma
  replicas: 1
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container:  uptime-kuma
      labels:
        app: uptime-kuma
    spec:
      containers:
      - name: uptime-kuma
        image: louislam/uptime-kuma:2
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3001
          name: uptime-kuma
        volumeMounts:
        - name: data
          mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: uptime-kuma

