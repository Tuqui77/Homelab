apiVersion: apps/v1
kind: Deployment
metadata:
  name: nfs-provisioner
  namespace: storage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nfs-provisioner
  template:
    metadata:
      labels:
        app: nfs-provisioner
    spec:
      serviceAccountName: nfs-provisioner
      containers:
        - name: nfs-provisioner
          image: registry.k8s.io/sig-storage/nfs-subdir-external-provisioner:v4.0.2@sha256:63d5e04551ec8b5aae83b6f35938ca5ddc50a88d85492d9731810c31591fa4c9
          env:
            - name: PROVISIONER_NAME
              value: nfs-subdir-external-provisioner
            - name: NFS_SERVER
              value: 192.168.100.56
            - name: NFS_PATH
              value: /Homelab/Kubernetes
          volumeMounts:
            - name: nfs
              mountPath: /persistentvolumes
      volumes:
        - name: nfs
          nfs:
            server: 192.168.100.56
            path: /Homelab/Kubernetes
