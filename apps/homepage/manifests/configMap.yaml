apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: dashboard
  labels:
    app.kubernetes.io/name: homepage
data:
  kubernetes.yaml: |
    mode: cluster
  settings.yaml: ""
  #settings.yaml: |
  #  providers:
  #    longhorn:
  #      url: https://longhorn.my.network
  custom.css: ""
  custom.js: ""
  bookmarks.yaml: |
    - Developer:
        - Github:
            - abbr: GH
              href: https://github.com/Tuqui77/Homelab
              
  services.yaml: |
    - NAS:
        - Qnap:
            icon: qnap.png
            href: http://192.168.100.56:8080
            description: Panel de control NAS Qnap
        - Pi-Hole:
            icon: pihole.png
            href: http://192.168.100.77/admin/login
            description: Panel de control Pi-Hole NAS

    - Cluster Kubernetes:
        - ArgoCD:
            icon: argocd.png
            href: https://argocd.tomasmerino.com
            description: ArgoCD dashboard
        
        - Immich:
            icon: immich.png
            href: https://immich.tomasmerino.com

        - Plex:
            icon: plex.png
            href: http://192.168.100.156:32400

  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "cluster"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - resources:
        backend: resources
        expanded: true
        cpu: true
        memory: true
        network: default
    - search:
        provider: duckduckgo
        target: _blank
  docker.yaml: ""
  