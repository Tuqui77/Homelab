apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: dashboard
  labels:
    app.kubernetes.io/name: homepage
data:
  kubernetes.yaml: |
    mode: cluster
  settings.yaml: |
      background: https://images.unsplash.com/photo-1485470733090-0aae1788d5af?q=80&w=1217&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D
      cardBlur: xs
      theme: dark
      color: slate
      target: _blank
      statusStyle: "dot"



  custom.css: ""
  custom.js: ""
  bookmarks.yaml: |
    - Developer:
        - Github:
            - abbr: GH
              href: https://github.com/Tuqui77/Homelab
              


  services.yaml: |
    - NAS:
        - Qnap:
            icon: qnap.png
            href: http://192.168.100.56:8080
            description: Panel de control NAS Qnap
        - Pi-Hole:
            icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/pi-hole.png
            href: http://192.168.100.77/admin/login
            description: Panel de control Pi-Hole NAS

    - Cluster Kubernetes:
        - ArgoCD:
            icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/argo-cd.png
            href: https://argocd.tomasmerino.com
            description: ArgoCD dashboard
        
        - Immich:
            icon: immich.png
            href: https://immich.tomasmerino.com

        - Plex:
            icon: plex.png
            href: http://192.168.100.156:32400/web

    - Proxmox:
        - Proxmox dashboard:
            icon: proxmox.png
            href: https://192.168.100.155:8006

  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "cluster"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - resources:
        backend: resources
        expanded: true
        cpu: true
        memory: true
        network: default
    - search:
        provider: duckduckgo
        target: _blank
  docker.yaml: ""
  