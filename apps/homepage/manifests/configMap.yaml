apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: dashboard
  labels:
    app.kubernetes.io/name: homepage
data:
  kubernetes.yaml: |
    mode: default
    gateway: true
  settings.yaml: |
    background:
        image: https://images.unsplash.com/photo-1485470733090-0aae1788d5af?q=80&w=1217&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D
        blur: lg
        opacity: 70
    cardBlur: xs
    theme: dark
    color: slate
    target: _self
    statusStyle: "dot"
    language: es

    layout:
      Servicios:
        style: row
        columns: 4

  custom.css: |
    .service-card {
        min-height: 120px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center
    }
  custom.js: ""
  bookmarks.yaml: |
    - Bookmarks:
        - Github:
            - abbr: GH
              href: https://github.com/Tuqui77
        - Youtube:
            - abbr: YT
              href: https://youtube.com
        - Reddit:
            - abbr: RT
              href: https://reddit.com
        - MercadoLibre:
            - abbr: ML
              href: https://mercadolibre.com.ar
        - MercadoPago:
            - abbr: MP
              href: https://mercadopago.com.ar

  services.yaml: |
    - Homelab:
        - Proxmox:
            icon: proxmox.png
            href: https://192.168.100.155:8006
            widget:
              type: proxmox
              url: https://192.168.100.155:8006
              username: api@pam!homepage
              password: {{HOMEPAGE_VAR_PROXMOX_API_KEY}}
              node: proxmox

        - ArgoCD:
            icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/argo-cd.png
            href: https://argocd.tomasmerino.com

        - Qnap:
            icon: qnap.png
            href: http://192.168.100.56:8080
            widget:
              type: qnap
              url: http://192.168.100.56:8080
              username: Tuqui
              password: {{HOMEPAGE_VAR_QNAP_PASS}}


    - Networking:
        - Router:
            icon: mdi-router-network-wireless
            href: http://192.168.100.1/

        - Pi-Hole (NAS):
            icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/pi-hole.png
            href: http://192.168.100.77/admin/login
            widget:
              type: pihole
              url: http://192.168.100.77
              version: 6
              key: {{HOMEPAGE_VAR_PIHOLE_API_KEY}}

        - Adguard Home (k8s):
            icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/adguard-home.png
            href: https://adguard.tomasmerino.com
            widget:
              type: adguard
              url: https://adguard.tomasmerino.com
              username: Tuqui
              password: {{HOMEPAGE_VAR_ADGUARD_PASS}}


    - Servicios:
        - Immich:
            icon: immich.png
            href: https://immich.tomasmerino.com
            widget:
              type: immich
              url: https://immich.tomasmerino.com
              key: {{HOMEPAGE_VAR_IMMICH_API_KEY}}
              version: 2

        - Plex:
            icon: plex.png
            href: http://plex.tomasmerino.com/web
            widget:
              type: plex
              url: http://192.168.100.156:32400
              key: {{HOMEPAGE_VAR_PLEX_API_KEY}}

        - Linkding:
            icon: linkding.png
            href: https://linkding.tomasmerino.com

        - LubeLogger:
            icon: lubelogger.png
            href: https://garage.tomasmerino.com
            widget:
              type: lubelogger
              url: https://garage.tomasmerino.com
              username: Tuqui
              password: {{HOMEPAGE_VAR_LUBELOGGER_PASS}}
              vehicleID: 1 # optional, changes to single-vehicle version

        - Grafana:
            icon: grafana.png
            href: https://grafana.tomasmerino.com

        - Paperless:
            icon: paperless.png
            href: https://paperless.tomasmerino.com

        - BookLore:
            icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/booklore.png
            href: https://booklore.tomasmerino.com
            widget:
              type: booklore
              url: https://booklore.tomasmerino.com
              username: Tuqui
              password: {{HOMEPAGE_VAR_BOOKLORE_PASS}}

        - UptimeKuma:
            icon: uptime-kuma.png
            href: https://uptime-kuma.tomasmerino.com
            widget:
              type: uptimekuma
              url: https://uptime-kuma.tomasmerino.com
              slug: homelab

        - qbittorrent:
            icon: qbittorrent.png
            href: https://qbittorrent.tomasmerino.com

        - BitMagnet:
            icon: bitmagnet.png
            href: https://bitmagnet.tomasmerino.com

        - Job-Ops:
            icon: https://jobops.dakheera47.com/docs/img/favicon.png
            href: http://job-ops.tomasmerino.com

  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "cluster"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - resources:
        backend: resources
        expanded: true
        cpu: true
        memory: true
        network: default
    - search:
        provider: google
        target: _self
  docker.yaml: ""
