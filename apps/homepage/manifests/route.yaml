apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homepage
  namespace: dashboard
spec:
  parentRefs:
    - name: homelab-gateway
      namespace: networking
  hostnames:
    - "homepage.tomasmerino.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: homepage
          port: 3000
