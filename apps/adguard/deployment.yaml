apiVersion: apps/v1
kind: Deployment
metadata:
  name: adguardhome
  namespace: adguard
  labels:
    app: adguardhome
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adguardhome
  template:
    metadata:
      labels:
        app: adguardhome
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        kubernetes.io/hostname: k8s-worker-01
      containers:
        - name: adguardhome
          image: adguard/adguardhome:latest
          ports:
            - containerPort: 53
              name: dns-tcp
              protocol: TCP
            - containerPort: 53
              name: dns-udp
              protocol: UDP
            - containerPort: 80
              name: gui
            - containerPort: 3000
              name: initial-config
          resources:
            requests:
              cpu: 25m
              memory: 250Mi
            limits:
              cpu: 25m
              memory: 250Mi
          volumeMounts:
            - mountPath: /opt/adguardhome/work
              name: data
            - mountPath: /opt/adguardhome/conf
              name: config
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: adguard-data
        - name: config
          persistentVolumeClaim:
            claimName: adguard-config
