apiVersion: apps/v1
kind: Deployment
metadata:
  name: cinephage
  namespace: media
  labels:
    app: cinephage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cinephage
  template:
    metadata:
      labels:
        app: cinephage
    spec:
      containers:
        - name: cinephage
          image: ghcr.io/moldytaint/cinephage:latest@sha256:2edde80863fa8a42b9d41fe300eaef2fdba0f7383cff705d6321379c4bf26dec
          ports:
            - containerPort: 3000
          env:
            - name: TZ
              value: America/Argentina/Buenos_Aires
            - name: ORIGIN
              value: "https://cinephage.tomasmerino.com"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            periodSeconds: 5
            failureThreshold: 10
            timeoutSeconds: 2
          volumeMounts:
            - mountPath: /config
              name: config
            - mountPath: /media
              name: media
            - mountPath: /downloads
              name: downloads
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: cinephage-config
        - name: media
          persistentVolumeClaim:
            claimName: plex-media
        - name: downloads
          persistentVolumeClaim:
            claimName: qbittorrent-downloads
