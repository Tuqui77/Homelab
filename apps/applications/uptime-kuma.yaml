apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
 name: uptime-kuma
 namespace: argocd
spec:
 project: default
 source:
   repoURL: https://github.com/Tuqui77/Homelab.git
   targetRevision: Main
   path: infrastructure/monitoring/uptime-kuma 
 destination:
   server: https://kubernetes.default.svc
   namespace: monitoring
 syncPolicy:
   automated:
     prune: true
     selfHeal: true

