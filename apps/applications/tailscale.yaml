apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
 name: tailscale
 namespace: argocd
spec:
 project: default
 source:
   repoURL: https://github.com/Tuqui77/Homelab.git
   targetRevision: Main
   path: infrastructure/networking/tailscale
 destination:
   server: https://kubernetes.default.svc
   namespace: tailscale
 syncPolicy:
   automated:
     prune: true
     selfHeal: true
