apiVersion: apps/v1
kind: Deployment
metadata:
  name: job-ops
  namespace: job-ops
  labels:
    app: job-ops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: job-ops
  template:
    metadata:
      labels:
        app: job-ops
    spec:
      containers:
        - name: job-ops
          image: ghcr.io/dakheera47/job-ops:v0.3.2
          ports:
            - containerPort: 3001
          env:
            - name: PYTHON_PATH
              value: "/usr/bin/python3"
            - name: PORT
              value: "3001"
            - name: NODE_ENV
              value: "production"
          volumeMounts:
            - mountPath: /app/data
              name: data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: job-ops-data
