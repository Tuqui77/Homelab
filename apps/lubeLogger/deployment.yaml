apiVersion: apps/v1
kind: Deployment
metadata:
  name: lubelogger
  labels:
    app: lubelogger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lubelogger
  template:
    metadata:
      labels:
        app: lubelogger
    spec:
      containers:
        - name: lubelogger
          image: ghcr.io/hargata/lubelogger:v1.6.6
          ports:
            - containerPort: 8080
          env:
            - name: LC_ALL
              value: es_AR
            - name: LANG
              value: es_AR
          volumeMounts:
            - mountPath: /App/data
              name: data
            - mountPath: /root/.aspnet/DataProtection-Keys
              name: keys
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: lubelogger-data
        - name: keys
          persistentVolumeClaim:
            claimName: lubelogger-keys
