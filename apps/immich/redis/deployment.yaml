apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-redis
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: immich-redis
  template:
    metadata:
      labels:
        app: immich-redis
    spec:
      containers:
        - name: redis
          image: redis:8
          resources:
            requests:
              cpu: 25m
              memory: 250
            limits:
              cpu: 25m
              memory: 250Mi
