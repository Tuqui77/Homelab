apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: immich-postgres-16
  namespace: media
spec:
  serviceName: immich-postgres
  replicas: 1
  selector:
    matchLabels:
      app: immich-postgres
      version: "16"
  template:
    metadata:
      labels:
        app: immich-postgres
        version: "16"
    spec:
      containers:
        - name: postgres
          image: ghcr.io/immich-app/postgres:16-vectorchord0.4.3-pgvectors0.2.0@sha256:1a078b237c1d9b420b0ee59147386b4aa60d3a07a8e6a402fc84a57e41b043a4
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: immich-db
                  key: DB_USERNAME
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: immich-db
                  key: DB_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: immich-db
                  key: DB_DATABASE_NAME
          resources:
            requests:
              cpu: 25m
              memory: 250Mi
            limits:
              cpu: 25m
              memory: 320Mi
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: data-16
  volumeClaimTemplates:
    - metadata:
        name: data-16
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: nfs-homelab
        resources:
          requests:
            storage: 20Gi
